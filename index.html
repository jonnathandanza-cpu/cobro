<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonnathan Arango | Control de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #050505; }
        body { background: var(--black); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-luxury { font-family: 'Cinzel', serif; }
        
        .btn-gold-elite {
            background: linear-gradient(135deg, #8a6d1c 0%, #f9e29c 30%, #d4af37 50%, #f9e29c 70%, #8a6d1c 100%);
            background-size: 200% auto; color: #000; font-weight: 800;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4); transition: 0.4s;
        }
        .btn-gold-elite:hover { background-position: right center; transform: scale(1.02); }

        .premium-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 1.5rem;
        }
        
        input, select { background: #111 !important; border: 1px solid #333 !important; color: white !important; outline: none; }
        input:focus { border-color: var(--gold) !important; }
        
        .gold-gradient {
            background: linear-gradient(135deg, #8a6d1c 0%, #f9e29c 50%, #8a6d1c 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .transfer-data { border: 1px dashed rgba(212, 175, 55, 0.5); background: rgba(212, 175, 55, 0.1); display: none; }
        .text-gold-main { color: var(--gold); }
        .border-gold-main { border-color: var(--gold); }
        .checkbox-gold { accent-color: var(--gold); transform: scale(1.2); }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-5xl mx-auto text-center mb-12 no-print flex flex-col items-center">
        <div class="w-16 h-16 rounded-full border-2 border-gold-main flex items-center justify-center mb-4">
            <span class="font-luxury text-2xl gold-gradient font-bold">JA</span>
        </div>
        <h1 class="font-luxury text-4xl tracking-[0.3em] gold-gradient mb-2 uppercase">Jonnathan Arango</h1>
        <p class="text-[10px] tracking-[0.5em] text-gold-main uppercase font-bold">Coreógrafo y Bailarín</p>
    </header>

    <main class="max-w-6xl mx-auto grid lg:grid-cols-2 gap-8 no-print">
        <section class="premium-card p-8 shadow-2xl">
            <h2 class="font-luxury text-gold-main mb-8 tracking-widest uppercase border-b border-gold-main/20 pb-2 text-sm">Nueva Venta</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase tracking-widest block mb-2">Nombre del Bailarín(es)</label>
                    <input type="text" id="nombreCliente" placeholder="NOMBRES COMPLETOS" class="w-full p-4 rounded-xl text-sm uppercase">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase tracking-widest block mb-4">Seleccionar Montaje</label>
                        <div class="space-y-3">
                            <label class="flex items-center space-x-3 text-xs cursor-pointer"><input type="radio" name="montaje" value="solista" checked onchange="actualizarInterfaz()" class="checkbox-gold"><span>Solista ($200k)</span></label>
                            <label class="flex items-center space-x-3 text-xs cursor-pointer"><input type="radio" name="montaje" value="duo" onchange="actualizarInterfaz()" class="checkbox-gold"><span>Dúo ($300k)</span></label>
                            <label class="flex items-center space-x-3 text-xs cursor-pointer"><input type="radio" name="montaje" value="pareja" onchange="actualizarInterfaz()" class="checkbox-gold"><span>Pareja ($300k)</span></label>
                            <label class="flex items-center space-x-3 text-xs cursor-pointer"><input type="radio" name="montaje" value="ninguno" onchange="actualizarInterfaz()" class="checkbox-gold"><span class="text-gray-500">Sin Montaje</span></label>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase tracking-widest block mb-4">Adicionales / Pago</label>
                        <label class="flex items-center space-x-3 text-xs cursor-pointer mb-6"><input type="checkbox" id="incluyePista" onchange="actualizarInterfaz()" class="checkbox-gold"><span class="text-gold-main font-bold">Pista Musical (+$20k)</span></label>
                        <select id="metodoPago" onchange="togglePagoInfo()" class="w-full p-3 rounded-xl text-xs">
                            <option value="Efectivo">Efectivo</option>
                            <option value="Transferencia Nequi">Transferencia Nequi</option>
                        </select>
                    </div>
                </div>

                <div id="infoTransferencia" class="transfer-data border-gold-main p-4 rounded-xl text-center">
                    <p class="text-[9px] uppercase tracking-widest text-gold-main mb-1">Nequi</p>
                    <p class="font-luxury text-lg gold-gradient font-bold">3233771827</p>
                </div>

                <div class="bg-black/60 p-6 rounded-2xl border-l-4 border-gold-main">
                    <div class="flex justify-between text-[10px] text-gray-400 uppercase tracking-widest mb-1">
                        <span>Total: <b id="display-total" class="text-white">$0</b></span>
                        <span class="gold-gradient font-bold">Abono (50%)</span>
                    </div>
                    <div class="text-3xl font-luxury text-white" id="display-abono">$0</div>
                    <div id="display-division" class="text-[9px] text-gold-main/80 mt-2 italic hidden"></div>
                </div>

                <button onclick="registrarVenta()" class="btn-gold-elite w-full py-6 rounded-xl tracking-[0.2em] uppercase text-xs">Generar Factura Unificada</button>
            </div>
        </section>

        <section class="premium-card p-8 flex flex-col">
            <h2 class="font-luxury text-gold-main mb-8 tracking-widest uppercase border-b border-gold-main/20 pb-2 text-sm">Portal del Artista</h2>
            <div class="mb-8">
                <input type="text" id="busquedaBailarin" oninput="buscarPista()" placeholder="Buscar..." class="w-full p-4 rounded-xl text-sm border-dashed border-gold-main/30 uppercase focus:border-gold-main">
            </div>
            <div id="resultadoBusqueda" class="flex-grow flex flex-col items-center justify-center space-y-4"></div>
            <button onclick="accesoMaster()" class="mt-8 w-full py-3 border border-gold-main/10 rounded-xl text-[9px] uppercase tracking-[0.5em] text-gold-main/50 hover:text-gold-main transition">Acceso Master</button>
        </section>
    </main>

    <!-- MODAL ADMINISTRADOR -->
    <div id="modalAdmin" class="fixed inset-0 bg-black/95 hidden z-[9999] p-4 md:p-10 overflow-y-auto no-print">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-luxury text-2xl gold-gradient uppercase tracking-widest">Base de Datos General</h2>
                <button onclick="cerrarAdmin()" class="text-white text-5xl font-thin hover:text-gold-main">&times;</button>
            </div>
            <div class="bg-white/5 rounded-3xl overflow-x-auto border border-gold-main/20">
                <table class="w-full text-left text-[11px] min-w-[700px]">
                    <thead class="bg-white/10 text-gold-main uppercase tracking-widest">
                        <tr>
                            <th class="p-4">Fecha</th>
                            <th class="p-4">Artista</th>
                            <th class="p-4">Conceptos</th>
                            <th class="p-4">Audio</th>
                            <th class="p-4">Saldo</th>
                            <th class="p-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAdmin" class="divide-y divide-gold-main/10"></tbody>
                </table>
            </div>
        </div>
    </div>

    <input type="file" id="hiddenFileInput" class="hidden" accept="audio/*">

    <script>
        const NUMERO_NEQUI = "3233771827";
        const PRECIOS = { solista: 200000, duo: 300000, pareja: 300000, pista: 20000, ninguno: 0 };
        let db = JSON.parse(localStorage.getItem('ja_system_v3')) || [];
        let currentEditingId = null;

        function togglePagoInfo() {
            const met = document.getElementById('metodoPago').value;
            document.getElementById('infoTransferencia').style.display = (met === 'Transferencia Nequi') ? 'block' : 'none';
        }

        function actualizarInterfaz() {
            const montajeSel = document.querySelector('input[name="montaje"]:checked').value;
            const incluyePista = document.getElementById('incluyePista').checked;
            let total = PRECIOS[montajeSel] + (incluyePista ? PRECIOS.pista : 0);
            const abono = total / 2;
            document.getElementById('display-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('display-abono').innerText = `$${abono.toLocaleString()}`;
            const divInfo = document.getElementById('display-division');
            if(montajeSel === 'duo' || montajeSel === 'pareja') {
                divInfo.classList.remove('hidden');
                divInfo.innerText = `* Por integrante: $${(abono/2).toLocaleString()} para el abono del 50%.`;
            } else divInfo.classList.add('hidden');
        }

        function registrarVenta() {
            const nombre = document.getElementById('nombreCliente').value.trim().toUpperCase();
            if(!nombre) return alert("Ingresa nombre");
            const montajeSel = document.querySelector('input[name="montaje"]:checked').value;
            const incluyePista = document.getElementById('incluyePista').checked;
            const met = document.getElementById('metodoPago').value;
            let conceptos = [];
            let total = PRECIOS[montajeSel] + (incluyePista ? PRECIOS.pista : 0);
            if(montajeSel !== 'ninguno') conceptos.push("MONTAJE " + montajeSel.toUpperCase());
            if(incluyePista) conceptos.push("PISTA MUSICAL");
            if(total === 0) return alert("Selecciona un servicio");
            const nuevaVenta = { id: Date.now(), nombre, servicio: conceptos.join(" + "), metodo: met, total, pagado: total / 2, archivoPista: null, fecha: new Date().toLocaleDateString('es-CO'), tipo: montajeSel };
            db.push(nuevaVenta);
            localStorage.setItem('ja_system_v3', JSON.stringify(db));
            imprimirDoc(nuevaVenta, 'FACTURA');
            document.getElementById('nombreCliente').value = "";
            document.getElementById('incluyePista').checked = false;
            actualizarInterfaz();
        }

        function imprimirDoc(v, tipo) {
            const win = window.open('', '_blank');
            const saldo = v.total - v.pagado;
            win.document.write(`<html><head><style>body{font-family:sans-serif;padding:40px;color:#333}.header{text-align:center;border-bottom:2px solid #d4af37;padding-bottom:10px}.title{text-align:center;font-weight:bold;margin:20px 0;color:#d4af37;font-size:20px;text-transform:uppercase}.box{background:#f9f9f9;padding:20px;border-radius:10px;border:1px solid #eee}.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}.footer{margin-top:50px;text-align:center;font-size:10px;color:#aaa}</style></head><body><div class="header"><h1>JONNATHAN ARANGO</h1><p style="color:#d4af37;text-transform:uppercase;font-size:10px;letter-spacing:3px">Coreógrafo y Bailarín</p></div><div class="title">${tipo}</div><p><b>ARTISTA:</b> ${v.nombre}</p><div class="box"><div class="row"><span>Servicio:</span><span>${v.servicio}</span></div><div class="row"><span>Método:</span><span>${v.metodo}</span></div><div class="row" style="font-weight:bold;border-top:2px solid #333;margin-top:10px"><span>TOTAL:</span><span>$${v.total.toLocaleString()}</span></div><div class="row"><span>ABONO (50%):</span><span>$${v.pagado.toLocaleString()}</span></div><div class="row" style="font-size:20px;color:#d4af37;font-weight:bold;border:0"><span>SALDO:</span><span>$${saldo.toLocaleString()}</span></div></div><div class="footer"><p>NIT. 1114902046-1 | Control Interno Digital</p></div><script>setTimeout(()=>{window.print();window.close()},500)<\/script></body></html>`);
        }

        function buscarPista() {
            const query = document.getElementById('busquedaBailarin').value.trim().toUpperCase();
            const res = document.getElementById('resultadoBusqueda');
            if(query.length < 3) return res.innerHTML = `<p class="text-gray-700 text-[10px] uppercase">Escribe tu nombre...</p>`;
            const r = db.find(reg => reg.nombre.includes(query));
            if(r) {
                const saldo = r.total - r.pagado;
                res.innerHTML = `<div class="premium-card p-6 w-full border-gold-main/40"><h3 class="font-luxury text-lg text-gold-main">${r.nombre}</h3><p class="text-[9px] text-gray-500 mb-4">${r.servicio}</p>${saldo <= 0 ? (r.archivoPista ? `<button onclick="descargarArchivo(${r.id})" class="btn-gold-elite w-full py-3 rounded-lg text-[10px]">Descargar Audio</button>` : `<p class="text-blue-400 text-xs italic">Saldado. Pendiente carga de audio.</p>`) : `<div class="bg-red-500/10 p-4 rounded-xl border border-red-500/20"><p class="text-red-400 text-xs font-bold uppercase">Deuda: $${saldo.toLocaleString()}</p></div>`}</div>`;
            } else res.innerHTML = `<p class="text-gray-700 text-[10px]">No registrado.</p>`;
        }

        function renderizarTabla() {
            const container = document.getElementById('tablaAdmin');
            container.innerHTML = db.map(r => {
                const saldo = r.total - r.pagado;
                return `<tr><td class="p-4 text-gray-500 text-[9px]">${r.fecha}</td><td class="p-4 font-bold uppercase text-white">${r.nombre}</td><td class="p-4 text-gray-400 text-[9px]">${r.servicio}</td><td class="p-4"><button onclick="prepararCarga(${r.id})" class="text-[10px] ${r.archivoPista ? 'text-green-500' : 'text-gold-main underline'}">${r.archivoPista ? '✓ Audio' : '+ Cargar'}</button></td><td class="p-4 ${saldo === 0 ? 'text-green-500' : 'text-red-400 font-bold'}">$${saldo.toLocaleString()}</td><td class="p-4 text-right space-x-2"><button onclick="reImprimir(${r.id})" class="text-gray-500 text-[9px] hover:text-white">DOC</button>${saldo > 0 ? `<button onclick="saldar(${r.id})" class="text-gold-main font-bold text-[9px] hover:underline">SALDAR</button>` : `<button onclick="reImprimirPS(${r.id})" class="text-blue-400 font-bold text-[9px] hover:underline">P&S</button>`}<button onclick="eliminar(${r.id})" class="text-red-900 ml-2">×</button></td></tr>`;
            }).reverse().join('');
        }

        function saldar(id) { db = db.map(r => r.id === id ? {...r, pagado: r.total} : r); localStorage.setItem('ja_system_v3', JSON.stringify(db)); renderizarTabla(); imprimirDoc(db.find(r => r.id === id), 'PAZ Y SALVO'); }
        function reImprimir(id) { imprimirDoc(db.find(r => r.id === id), 'FACTURA'); }
        function reImprimirPS(id) { imprimirDoc(db.find(r => r.id === id), 'PAZ Y SALVO'); }
        function eliminar(id) { if(confirm("¿Eliminar registro?")) { db = db.filter(r => r.id !== id); localStorage.setItem('ja_system_v3', JSON.stringify(db)); renderizarTabla(); } }
        
        function prepararCarga(id) { currentEditingId = id; document.getElementById('hiddenFileInput').click(); }
        document.getElementById('hiddenFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { db = db.map(r => r.id === currentEditingId ? { ...r, archivoPista: ev.target.result } : r); localStorage.setItem('ja_system_v3', JSON.stringify(db)); renderizarTabla(); alert("Audio vinculado correctamente."); };
            reader.readAsDataURL(file);
        });
        function descargarArchivo(id) { const r = db.find(reg => reg.id === id); const link = document.createElement("a"); link.href = r.archivoPista; link.download = `PISTA_${r.nombre}.mp3`; link.click(); }

        // --- FUNCIONES DE APERTURA ---
        function accesoMaster() {
            const pass = prompt("Introduce la clave de Director:");
            if (pass === "091993") {
                const modal = document.getElementById('modalAdmin');
                modal.classList.remove('hidden');
                renderizarTabla();
            } else if (pass !== null) {
                alert("Clave incorrecta");
            }
        }

        function cerrarAdmin() {
            document.getElementById('modalAdmin').classList.add('hidden');
        }
        
        // Carga inicial
        actualizarInterfaz();
    </script>
</body>
</html>
