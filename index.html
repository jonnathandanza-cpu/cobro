<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JA_SOLUTECH | Master Admin</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root { --neon: #00f3ff; --purple: #bc13fe; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .panel { max-width: 800px; margin: auto; background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--purple); }
        h1 { color: var(--purple); text-transform: uppercase; letter-spacing: 5px; font-size: 1.2rem; }
        input, button { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; width: 100%; margin-bottom: 15px; }
        button { background: var(--purple); cursor: pointer; font-weight: bold; border: none; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #222; }
        .status-pendiente { color: #ffae00; }
        .status-aprobado { color: #00ff88; }
        .btn-approve { background: var(--neon); color: #000; padding: 5px 10px; width: auto; font-size: 0.7rem; }
        .btn-delete { background: #ff4b4b; margin-left: 5px; width: auto; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="panel">
    <h1>PANEL DE CONTROL ESTRATÉGICO</h1>
    
    <div style="display: flex; gap: 10px;">
        <input type="text" id="name" placeholder="Nombre del Cliente">
        <input type="file" id="files" multiple>
    </div>
    <button onclick="register()">REGISTRAR CLIENTE Y ARCHIVOS</button>

    <table>
        <thead>
            <tr>
                <th>CLIENTE</th>
                <th>ESTADO</th>
                <th>GESTIÓN</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>

<script>
    const db = new Dexie("SoluTech_Vault_v3");
    db.version(1).stores({ clients: "name, status", files: "++id, clientName, fileName, blob" });

    async function register() {
        const name = document.getElementById('name').value.trim().toLowerCase();
        const files = document.getElementById('files').files;
        if(!name || files.length === 0) return alert("Datos incompletos.");

        await db.clients.put({ name: name, status: "pendiente" });
        for(let f of files) { await db.files.add({ clientName: name, fileName: f.name, blob: f }); }
        
        alert("Cliente registrado.");
        location.reload();
    }

    async function refresh() {
        const clients = await db.clients.toArray();
        const tbody = document.getElementById('list');
        tbody.innerHTML = clients.map(c => `
            <tr>
                <td>${c.name.toUpperCase()}</td>
                <td class="status-${c.status}">${c.status.toUpperCase()}</td>
                <td>
                    ${c.status === 'pendiente' ? `<button class="btn-approve" onclick="approve('${c.name}')">APROBAR</button>` : '✅'}
                    <button class="btn-delete" onclick="remove('${c.name}')">ELIMINAR</button>
                </td>
            </tr>
        `).join('');
    }

    async function approve(name) { await db.clients.update(name, { status: "aprobado" }); refresh(); }
    async function remove(name) { 
        if(confirm("¿Borrar cliente y sus archivos?")) {
            await db.clients.delete(name);
            await db.files.where("clientName").equals(name).delete();
            refresh();
        }
    }
    refresh();
</script>
</body>
</html>
