<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JA_SOLUTECH | Secure Asset Vault</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root { --neon: #00f3ff; --alert: #bc13fe; --bg: #050505; --surface: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; }
        
        .section { background: var(--surface); border: 1px solid #222; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--neon); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        input, button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: none; box-sizing: border-box; outline: none; transition: 0.3s; }
        input { background: #000; color: var(--neon); border: 1px solid #333; }
        input:focus { border-color: var(--neon); }

        .btn-primary { background: var(--alert); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-wa { background: #25D366; color: white; font-weight: bold; cursor: pointer; }
        .btn-approve { background: var(--neon); color: #000; font-weight: bold; cursor: pointer; padding: 5px 10px; width: auto; font-size: 0.7rem; }

        /* TABLA DE CONTROL */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8rem; }
        th { text-align: left; color: #666; padding: 10px; border-bottom: 1px solid #222; }
        td { padding: 10px; border-bottom: 1px solid #222; }

        .status-pending { color: #ffa500; font-weight: bold; }
        .status-approved { color: #00ff00; font-weight: bold; }

        .nequi-card { background: linear-gradient(135deg, #7000ff, #d300ff); padding: 20px; border-radius: 15px; text-align: center; margin: 20px 0; }
        
        .file-box { background: rgba(0,243,255,0.05); padding: 15px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--neon); }
        .download-btn { color: var(--neon); text-decoration: none; border: 1px solid var(--neon); padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; letter-spacing: 10px; color: var(--neon); font-size: 1.5rem;">JA_SOLUTECH</h1>

    <div class="section" style="border-color: var(--alert);">
        <h2>⚙️ PANEL DE GESTIÓN Y PAGOS</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="text" id="adminName" placeholder="Nombre Cliente">
            <input type="file" id="adminFiles" multiple>
        </div>
        <button class="btn-primary" onclick="uploadAndStayPending()">Registrar Nuevos Archivos</button>

        <table id="adminTable">
            <thead>
                <tr>
                    <th>CLIENTE</th>
                    <th>ESTADO</th>
                    <th>ACCIÓN</th>
                </tr>
            </thead>
            <tbody id="adminList"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>💎 ACCESO A ARCHIVOS</h2>
        <input type="text" id="clientSearch" placeholder="Ingresa tu nombre completo">
        
        <div class="nequi-card">
            PAGO ÚNICO VÍA NEQUI: 300 000 0000<br>
            <span style="font-size: 0.7rem; font-weight: normal; opacity: 0.8;">Tras el pago, pulsa el botón para solicitar activación</span>
        </div>

        <button class="btn-wa" onclick="clientRequest()">ENVIAR COMPROBANTE POR WHATSAPP</button>

        <div id="downloadArea" style="display:none; margin-top: 30px;">
            <p style="color: var(--neon); font-size: 0.8rem;">✓ PAGO VERIFICADO. TUS ARCHIVOS:</p>
            <div id="fileDisplay"></div>
        </div>
    </div>
</div>

<script>
    // Inicializar DB (Dexie)
    const db = new Dexie("SoluTech_Vault_v3");
    db.version(1).stores({
        clients: "name, status",
        files: "++id, clientName, fileName, blob"
    });

    const WHATSAPP = "573000000000"; // Tu número real

    // --- FUNCIONES ADMIN ---

    async function uploadAndStayPending() {
        const name = document.getElementById('adminName').value.trim().toLowerCase();
        const files = document.getElementById('adminFiles').files;

        if(!name || files.length === 0) return alert("Completa los datos de carga.");

        // Guardar o actualizar cliente como PENDIENTE
        await db.clients.put({ name: name, status: "pendiente" });

        // Guardar archivos
        for(let f of files) {
            await db.files.add({ clientName: name, fileName: f.name, blob: f });
        }

        alert(`Archivos cargados para ${name}. Esperando pago.`);
        document.getElementById('adminName').value = "";
        refreshAdminTable();
    }

    async function refreshAdminTable() {
        const clients = await db.clients.toArray();
        const list = document.getElementById('adminList');
        list.innerHTML = "";

        clients.forEach(c => {
            list.innerHTML += `
                <tr>
                    <td>${c.name.toUpperCase()}</td>
                    <td><span class="status-${c.status}">${c.status.toUpperCase()}</span></td>
                    <td>
                        ${c.status === 'pendiente' ? 
                        `<button class="btn-approve" onclick="approveClient('${c.name}')">ACEPTAR PAGO</button>` : 
                        '✔️'}
                    </td>
                </tr>
            `;
        });
    }

    async function approveClient(name) {
        await db.clients.update(name, { status: "aprobado" });
        alert("¡Pago aprobado! El cliente ya puede descargar.");
        refreshAdminTable();
    }

    // --- FUNCIONES CLIENTE ---

    async function clientRequest() {
        const name = document.getElementById('clientSearch').value.trim().toLowerCase();
        if(!name) return alert("Escribe tu nombre.");

        const clientData = await db.clients.get(name);

        if(!clientData) {
            alert("No tienes archivos asignados o el nombre es incorrecto.");
            return;
        }

        if(clientData.status === "aprobado") {
            showFiles(name);
        } else {
            // Abrir WhatsApp para que envíe el comprobante
            const msg = encodeURIComponent(`Hola JA_SOLUTECH, soy ${name.toUpperCase()}. Acabo de realizar el pago, por favor habilitar mis archivos.`);
            window.open(`https://wa.me/${WHATSAPP}?text=${msg}`, '_blank');
            alert("Solicitud enviada. Una vez el administrador acepte tu pago, tus archivos aparecerán aquí.");
        }
    }

    async function showFiles(clientName) {
        const files = await db.files.where("clientName").equals(clientName).toArray();
        const display = document.getElementById('fileDisplay');
        display.innerHTML = "";

        files.forEach(f => {
            const url = URL.createObjectURL(f.blob);
            display.innerHTML += `
                <div class="file-box">
                    <span>${f.fileName}</span>
                    <a href="${url}" download="${f.fileName}" class="download-btn">DESCARGAR</a>
                </div>`;
        });
        document.getElementById('downloadArea').style.display = "block";
    }

    // Iniciar tabla al cargar
    refreshAdminTable();
</script>

</body>
</html>
